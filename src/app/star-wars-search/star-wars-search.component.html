<p>star-wars-search works!</p>
<form>
    <label>
        Search character: 
    </label>
    <input [formControl]="characterName" placeholder="Enter name">
</form>
<button (click)="performSearch()">Search</button>

<table>
    <thead>
        <th>Title</th>
        <th>Year</th>
    </thead>
    <tbody>
        <tr *ngFor="let item of filmDataList">
            <td>{{ item.title }}</td>
            <td>{{ item.year }}</td>
        </tr>
    </tbody>
</table>
